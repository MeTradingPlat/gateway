spring:
  application:
    name: gateway
  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "https://metradingplat.com"
              - "https://www.metradingplat.com"
              - "http://localhost:4200"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      server:
        webflux:
          routes:
            - id: scanner-management-service
              uri: lb://scanner-management-service
              predicates:
                - Path=/api/escaner/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
            - id: marketdata-service
              uri: lb://marketdata-service
              predicates:
                - Path=/api/marketdata/**,/api/test/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
              metadata:
                response-timeout: 120000
                connect-timeout: 10000
            - id: asset-management-service
              uri: lb://asset-management-service
              predicates:
                - Path=/api/activos/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
            - id: log-service
              uri: lb://log-service
              predicates:
                - Path=/api/logs/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notificaciones/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
                - AddResponseHeader=X-Accel-Buffering,no
                - AddResponseHeader=Cache-Control,no-cache
              metadata:
                response-timeout: -1
                connect-timeout: 10000
            # signal-processing-service es Python/FastAPI y no registra en Eureka.
            # URI directa al nombre del container en la red Docker.
            # Sus endpoints son llamados internamente por scanner-management-service.
            - id: signal-processing-service
              uri: http://signal-processing-service:8000
              predicates:
                - Path=/api/signal-processing/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
              metadata:
                response-timeout: 30000
                connect-timeout: 5000
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

  profiles:
    active: prod

logging:
  level:
    "[com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver]": WARN

server:
  port: 8080
  netty:
    # Las conexiones SSE reciben heartbeats cada 30s, por lo que nunca alcanzan
    # este timeout. Las conexiones HTTP inactivas se limpian tras 5 minutos.
    idle-timeout: 300s

# Configuración del rate limiting del gateway
gateway:
  rate-limit:
    habilitado: true
    limite-peticiones-por-minuto: 120
    umbral-baneo-automatico: 300
    duracion-baneo-minutos: 10
    expiracion-bucket-minutos: 15
    maximo-ips-en-cache: 50000

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
