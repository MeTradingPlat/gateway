spring:
  application:
    name: gateway
  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              order: -1
              predicates:
                - Path=/auth/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
            - id: scanner-management-service
              uri: lb://scanner-management-service
              predicates:
                - Path=/escaner/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
                - JwtAuthenticationFilter
            - id: marketdata-service
              uri: lb://marketdata-service
              predicates:
                - Path=/marketdata/**,/test/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
                - name: JwtAuthenticationFilter
                  args:
                    adminOnly: true
              metadata:
                response-timeout: 120000
                connect-timeout: 10000
            - id: asset-management-service
              uri: lb://asset-management-service
              predicates:
                - Path=/activos/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
                - JwtAuthenticationFilter
            - id: log-service
              uri: lb://log-service
              predicates:
                - Path=/logs/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
                - name: JwtAuthenticationFilter
                  args:
                    adminOnly: true
            - id: notification-service-en
              uri: lb://notification-service
              order: 1
              predicates:
                - Path=/notifications/**
              filters:
                - RewritePath=/notifications/(?<path>.*), /notificaciones/${path}
                - AddRequestHeader=X-Gateway-Passed,true
                - JwtAuthenticationFilter
                - AddResponseHeader=X-Accel-Buffering,no
                - AddResponseHeader=Cache-Control,no-cache
              metadata:
                response-timeout: -1
                connect-timeout: 10000
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notificaciones/**
              filters:
                - AddRequestHeader=X-Gateway-Passed,true
                - JwtAuthenticationFilter
                - AddResponseHeader=X-Accel-Buffering,no
                - AddResponseHeader=Cache-Control,no-cache
              metadata:
                response-timeout: -1
                connect-timeout: 10000
          # signal-processing-service NO está expuesto en el gateway.
          # Se comunica exclusivamente dentro de la red Docker:
          #   - scanner-management → signal-processing (REST interno)
          #   - signal-processing → scanner-management (REST interno)
          #   - ambos ↔ Kafka (red interna)
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

  profiles:
    active: prod

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    "[org.springframework.cloud.gateway]": DEBUG
    "[org.springframework.http.server.reactive]": DEBUG
    "[org.springframework.web.reactive]": DEBUG
    "[com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver]": WARN
    "[com.netflix.discovery]": WARN

server:
  port: 8080
  netty:
    # Las conexiones SSE reciben heartbeats cada 30s, por lo que nunca alcanzan
    # este timeout. Las conexiones HTTP inactivas se limpian tras 5 minutos.
    idle-timeout: 300s

# Configuración del rate limiting del gateway
gateway:
  rate-limit:
    habilitado: false
    limite-peticiones-por-minuto: 120
    umbral-baneo-automatico: 300
    duracion-baneo-minutos: 10
    expiracion-bucket-minutos: 15
    maximo-ips-en-cache: 50000

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always
